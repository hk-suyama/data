<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>模試国語 出典データベース</title>
<style>
:root {
  --bg: #faf9f6; --card: #ffffff; --ink: #2b2b2b; --sub: #767068;
  --line: #e6e2da; --accent: #8a3324; --accent-soft: #f3e8e4;
  --hyoron: #3a5a8c; --zuihitsu: #6b8e23; --shosetsu: #b8860b;
  --kobun: #8a3324; --kanbun: #5b4a8a; --shiika: #c2607e; --other: #767068;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--bg); color: var(--ink);
  font-family: "Yu Gothic Medium", "YuGothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
  font-size: 14px; line-height: 1.6;
}
header {
  background: linear-gradient(135deg, #2f2a26, #4a3f37);
  color: #f5f1ea; padding: 26px 28px 20px;
}
header h1 { margin: 0 0 4px; font-size: 21px; font-weight: 600; letter-spacing: .06em; }
header .meta { font-size: 12.5px; color: #cfc6ba; }
header .meta b { color: #f0e6d8; font-weight: 600; }
.wrap { max-width: 1240px; margin: 0 auto; padding: 18px 20px 60px; }
.controls {
  background: var(--card); border: 1px solid var(--line); border-radius: 10px;
  padding: 14px 16px; margin-bottom: 14px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  position: sticky; top: 0; z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,.05);
}
.controls input[type=search] {
  flex: 1 1 220px; padding: 8px 12px; border: 1px solid var(--line); border-radius: 7px;
  font-size: 14px; font-family: inherit; background: #fdfcfa;
}
.controls select {
  padding: 7px 8px; border: 1px solid var(--line); border-radius: 7px;
  font-size: 13px; font-family: inherit; background: #fdfcfa; max-width: 230px;
}
.controls .count { margin-left: auto; font-size: 12.5px; color: var(--sub); white-space: nowrap; }
.controls .count b { color: var(--accent); font-size: 15px; }
.genre-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.chip {
  border: 1px solid var(--line); background: var(--card); border-radius: 999px;
  padding: 4px 13px; font-size: 12.5px; cursor: pointer; user-select: none; color: var(--sub);
}
.chip.on { color: #fff; border-color: transparent; }
.chip .n { opacity: .7; font-size: 11px; margin-left: 3px; }
table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
thead th {
  text-align: left; font-size: 12px; color: var(--sub); font-weight: 600;
  padding: 9px 10px; border-bottom: 2px solid var(--line); background: #f6f3ee;
  cursor: pointer; white-space: nowrap; user-select: none;
}
thead th .arrow { font-size: 10px; opacity: .55; }
tbody td { padding: 8px 10px; border-bottom: 1px solid #f0ece5; vertical-align: top; }
tbody tr:hover { background: #faf6f0; }
td.nendo { white-space: nowrap; font-variant-numeric: tabular-nums; color: var(--sub); font-size: 12.5px; }
td.moshi { font-size: 12.5px; min-width: 120px; }
td.daimon { text-align: center; white-space: nowrap; }
td.author { white-space: nowrap; font-weight: 600; }
td.title { min-width: 150px; }
td.title .t { font-weight: 600; }
.badge {
  display: inline-block; padding: 1px 9px; border-radius: 999px; font-size: 11.5px;
  color: #fff; letter-spacing: .05em; white-space: nowrap;
}
.b-評論 { background: var(--hyoron); } .b-随筆 { background: var(--zuihitsu); }
.b-小説 { background: var(--shosetsu); } .b-古文 { background: var(--kobun); }
.b-漢文 { background: var(--kanbun); } .b-詩歌 { background: var(--shiika); }
.b-その他 { background: var(--other); }
.subbadge {
  display: inline-block; padding: 1px 8px; border-radius: 5px; font-size: 11px;
  background: #efece6; color: #5c554c; border: 1px solid #e0dbd2; white-space: nowrap;
  cursor: pointer;
}
.subbadge:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.note { color: var(--sub); font-size: 12px; margin-top: 2px; }
.warn { background: #fdf3e4; }
.warn td { border-bottom-color: #f3e2c4; }
.file { color: #b0a89d; font-size: 11px; margin-top: 1px; }
.empty { text-align: center; color: var(--sub); padding: 40px 0; font-size: 14px; }
footer { margin-top: 22px; font-size: 11.5px; color: var(--sub); text-align: center; }
@media print {
  .controls, .genre-chips { display: none; }
  body { background: #fff; font-size: 11px; }
}
</style>
</head>

const norm = s => (s||"").toString().toLowerCase();

function uniq(key){ return [...new Set(DATA.map(r=>r[key]).filter(Boolean))].sort(); }
uniq("series").forEach(v=>{ const o=document.createElement("option"); o.value=v; o.textContent="シリーズ: "+v; $("fSeries").appendChild(o); });
uniq("nendo").forEach(v=>{ const o=document.createElement("option"); o.value=v; o.textContent="年度: "+v; $("fNendo").appendChild(o); });

// 細ジャンル: 現代文/古文/漢文でグループ化した optgroup、件数付き
(function(){
  const counts={}; DATA.forEach(r=>{ counts[r.sub]=(counts[r.sub]||0)+1; });
  SUB_GROUPS.forEach(([label, subs])=>{
    const og=document.createElement("optgroup"); og.label=label;
    subs.forEach(s=>{
      if(!counts[s]) return;
      const o=document.createElement("option"); o.value=s; o.textContent=s+"（"+counts[s]+"）";
      og.appendChild(o);
    });
    if(og.children.length) $("fSub").appendChild(og);
  });
})();

function buildChips(){
  const counts = {};
  DATA.forEach(r=>{ counts[r.genre]=(counts[r.genre]||0)+1; });
  GENRES.forEach(g=>{
    if(!counts[g]) return;
    const c=document.createElement("span");
    c.className="chip"; c.dataset.g=g;
    c.innerHTML=g+'<span class="n">'+counts[g]+"</span>";
    c.onclick=()=>{ activeGenres.has(g)?activeGenres.delete(g):activeGenres.add(g); c.classList.toggle("on"); c.style.background=c.classList.contains("on")?GCOLORS[g]:""; render(); };
    $("chips").appendChild(c);
  });
}

function filtered(){
  const q=norm($("q").value), fs=$("fSeries").value, fn=$("fNendo").value, fsub=$("fSub").value;
  let out = DATA.filter(r=>{
    if(fs && r.series!==fs) return false;
    if(fn && r.nendo!==fn) return false;
    if(fsub && r.sub!==fsub) return false;
    if(activeGenres.size && !activeGenres.has(r.genre)) return false;
    if(q){
      const hay = norm(r.author)+" "+norm(r.title)+" "+norm(r.note)+" "+norm(r.moshi)+" "+norm(r.nendo)+" "+norm(r.sub);
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  if(sortKey){
    out=[...out].sort((a,b)=>{
      const x=(a[sortKey]||""), y=(b[sortKey]||"");
      return sortAsc ? x.localeCompare(y,"ja") : y.localeCompare(x,"ja");
    });
  }
  return out;
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function render(){
  const rows=filtered();
  $("cnt").textContent=rows.length;
  $("empty").style.display=rows.length?"none":"block";
  $("tb").innerHTML=rows.map(r=>{
    const warn=r.note.includes("⚠");
    const badge=GENRES.includes(r.genre)?'<span class="badge b-'+r.genre+'">'+r.genre+'</span>':esc(r.genre);
    return '<tr class="'+(warn?"warn":"")+'">'
      +'<td class="nendo">'+esc(r.nendo)+'</td>'
      +'<td class="moshi">'+esc(r.moshi)+'<div class="file">'+esc(r.file)+'</div></td>'
      +'<td class="daimon">'+esc(r.daimon)+'</td>'
      +'<td>'+badge+'</td>'
      +'<td><span class="subbadge" data-sub="'+esc(r.sub)+'">'+esc(r.sub)+'</span></td>'
      +'<td class="author">'+esc(r.author)+'</td>'
      +'<td class="title"><span class="t">'+esc(r.title)+'</span></td>'
      +'<td><div class="note">'+esc(r.note)+'</div></td>'
      +'</tr>';
  }).join("");
}

// 細ジャンルバッジのクリックで絞り込み
document.getElementById("tb").addEventListener("click", e=>{
  const b=e.target.closest(".subbadge");
  if(!b) return;
  $("fSub").value = ($("fSub").value===b.dataset.sub) ? "" : b.dataset.sub;
  render();
});

document.querySelectorAll("thead th[data-k]").forEach(th=>{
  th.onclick=()=>{ const k=th.dataset.k; if(sortKey===k){sortAsc=!sortAsc;}else{sortKey=k;sortAsc=true;} render(); };
});
["q","fSeries","fNendo","fSub"].forEach(id=>{ $(id).addEventListener("input",render); });
// ブラウザのフォーム復元で絞り込みが残らないよう、読み込み時は必ず全件表示に戻す
function resetAll(){ $("q").value=""; $("fSeries").value=""; $("fNendo").value=""; $("fSub").value=""; render(); }
window.addEventListener("pageshow", resetAll);
buildChips(); resetAll();
</script>
</body>
</html>
